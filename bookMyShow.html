<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Clone</title>
    <link rel="stylesheet" href="bookMyShow.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">

        <div class="nav-left">
            <h2 class="logo">book<span>my</span>show</h2>

            <div class="search-box">
                <input type="text"
                    placeholder="Search for Movies, Events, Plays, Sports and Activities">
            </div>
        </div>

        <div class="nav-right">
            <span>Mumbai ▼</span>
            <button>Sign In</button>
            <div class="menu">☰</div>
        </div>

    </nav>

    <!-- Menu Links -->
    <div class="menu-links">

        <div class="left-links">
            <a href="#">Movies</a>
            <a href="#">Stream</a>
            <a href="#">Events</a>
            <a href="#">Plays</a>
            <a href="#">Sports</a>
            <a href="#">Activities</a>
        </div>

        <div class="right-links">
            <a href="#">ListYourShow</a>
            <a href="#">Corporates</a>
            <a href="#">Offers</a>
            <a href="#">Gift Cards</a>
        </div>

    </div>

    <!-- Banner -->
    <section class="banner">
        <div class="banner-content">
            <h1>Flat 5% Cashback</h1>
            <p>Get extra cashback of ₹100 on your first BookMyShow payment.</p>
            <button>Apply Now</button>
        </div>
    </section>

    <!-- Recommended Movies -->
    <section class="movies-section">

        <div class="heading">
            <h2>Recommended Movies</h2>
            <a href="#">See All</a>
        </div>

        <div class="movies-container">

            <div class="movie-card">
                <img src="https://picsum.photos/250/350?1" alt="">
            </div>

            <div class="movie-card">
                <img src="https://picsum.photos/250/350?2" alt="">
            </div>

            <div class="movie-card">
                <img src="https://picsum.photos/250/350?3" alt="">
            </div>

            <div class="movie-card">
                <img src="https://picsum.photos/250/350?4" alt="">
            </div>

            <div class="movie-card">
                <img src="https://picsum.photos/250/350?5" alt="">
            </div>

        </div>

    </section>

</body>
</html>
