<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid2</title>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
      .container{
    display: grid;
    height: 400px;
    width: 600px;
    grid-template-rows: repeat(3,1fr);
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    border: 1px solid blueviolet;
    background-color: rgb(49, 2, 49);
    padding: 7px;
}



h1{
    color: aliceblue;
    margin: 0;
}

p{
    color: white;
    margin: 5px 0;
}
       .box1{
    background-color: purple;
    grid-column: 1/2;
    grid-row: 1/2;
border-radius: 10px;
    display: flex;
    flex-direction: row; 
    justify-content: center;
    align-items: center;
    gap: 20px;
}
.box1 i{
    color: white;
    font-size: 30px;
}


        .box2{
            background-color: purple;
            border-radius: 10px;

             display: flex;
    flex-direction: column;
    justify-content: center; 
    align-items: center;     
    text-align: center;
    
        }
        .box3{
            background-color: purple; 
            border-radius: 10px;
             display: flex;
    flex-direction: column;
    justify-content: center; 
    align-items: center;     
    text-align: center; 

        }
        .box4{
             background-color: blueviolet;
             grid-column: 2/3;
             grid-row:2/3;
             border-radius: 10px;
              display: flex;
    flex-direction: column;
    justify-content: center; 
    align-items: center;     
    text-align: center;
        }
        .box5{
             background-color: purple;
             grid-column: 1/2;
             grid-row:2/3;
             border-radius: 10px;
              display: flex;
    flex-direction: column;
    justify-content: center; 
    align-items: center;     
    text-align: center;
              
        }
        .box6{
            background-color: whitesmoke;
             grid-row: 2/4;
             grid-column:3/4;
border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;; 
    align-items: center;     
    text-align: center;

             
        }
        .box7{
            background-color: purple;
            grid-row: 3/4;
            grid-column:1/3 ;
            border-radius: 10px;
             
        }
        </style>
</head>
<body>
    <div class="container">
        <div class="box1">
            <i class="fa-brands fa-youtube"></i>
    <i class="fa-brands fa-twitter"></i>
    <i class="fa-brands fa-linkedin"></i>
    <i class="fa-brands fa-facebook"></i>
        </div>
        <div class="box2">
            <h1 style>25K</h1>
            <p>Weekly likes</p>
        </div>
        <div class="box3">
            <h1>50K</h1>
            <p>Weekly Views</p>
        </div>
        <div class="box4">
             <h1>DESIGN</h1>
        </div>
        <div class="box5">
             <p>Active User</p>
            <h1>1,538</h1>
        </div>
        <div class="box6">
            <p style="color: black;">Total Subscribers</p>
            <h1 style="color: black;">200K</h1>
        </div>
        <div class="box7">
            <p>A place to learn UI Design &</p>
            <p>Web Design.</p>
        </div>
    </div>
</body>
</html>
