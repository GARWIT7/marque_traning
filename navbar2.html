<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flex Navbar</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
    }

    nav {
      background: #222;
      padding: 15px 30px;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

  
    .nav-links {
      display: flex;
      gap: 20px;
      list-style: none;
      align-items: center;

      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-size: 16px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #00bcd4;
    }

   
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-box input {
      padding: 7px 12px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    .search-box button {
      padding: 7px 12px;
      border: none;
      border-radius: 5px;
      background: #00bcd4;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .search-box button:hover {
      background: #0097a7;
    }

 .navbar {
  height: 60px;
  background: #222;
  color: white;
  display: flex;
  align-items: center;
  padding: 0 20px;
}

.boxes {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px; 
  flex-wrap: wrap;
}

.box {
  width: 250px;
  height: 250px;
  background: #00bcd4;
  border-radius: 10px;
 
} 

    
  </style>
</head>

<body>

  <nav>
    <div class="navbar">

      <div class="logo">Logo</div>

      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      
      <div class="search-box">
        <input type="text" placeholder="Search...">
        <button>Search</button>
      </div>

    </div>
  </nav>

   <div class="boxes">
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
</div>
  

</body>
</html>
